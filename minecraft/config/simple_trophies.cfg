        {TrophyName:"Engineer Trophy",TrophyVariant:"classic",TrophyItem:{id:"thermalexpansion:frame",Count:1b,Damage:0s},TrophyColorRed:200,TrophyColorGreen:200,TrophyColorBlue:200}
        {TrophyName:"Chemical Worker Trophy",TrophyVariant:"classic",TrophyItem:{id:"actuallyadditions:block_empowerer",Count:1b,Damage:0s},TrophyColorRed:196,TrophyColorGreen:196,TrophyColorBlue:166}
        {TrophyName:"Spacefarer Trophy",TrophyVariant:"classic",TrophyItem:{id:"libvulpes:productingot",Count:1b,Damage:7s},TrophyColorRed:214,TrophyColorGreen:211,TrophyColorBlue:248}
        {TrophyName:"Blood Practicioner Trophy",TrophyVariant:"classic",TrophyItem:{id:"enderio:item_material",Count:1b,Damage:1s},TrophyColorRed:109,TrophyColorGreen:117,TrophyColorBlue:117}
