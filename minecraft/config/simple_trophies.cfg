    S:creativeTabTrophies <
        {TrophyName:"Beginner Trophy",TrophyVariant:"classic",TrophyItem:{id:"theaurorian:aurorianportalframebricks",Count:1b,Damage:0s},TrophyColorRed:109,TrophyColorGreen:128,TrophyColorBlue:150}
        {TrophyName:"Metallurgist Trophy",TrophyVariant:"classic",TrophyItem:{id:"tconstruct:materials",Count:1b,Damage:0s},TrophyColorRed:93,TrophyColorGreen:93,TrophyColorBlue:93}
