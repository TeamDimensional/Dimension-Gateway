# Configuration file

client {
    # Final color brightness. Example: 0.8 is softer, 1.2 is brighter. [range: 0.0 ~ 3.0, default: 1.0]
    S:displayBrightnessBoost=1.0

    # Final color saturation. Example: 0.8 is softer, 1.2 is richer. [range: 0.0 ~ 3.0, default: 1.0]
    S:displaySaturationBoost=1.0

    # If true, the final shown color gets a cleanup pass after extraction. Example: turn this off for rawer colors. [default: true]
    B:enableDisplayColorEnhancement=true

    # If true, detected raw colors go through the display filter. Example: turn this off to show the extracted raw main color directly. [default: false]
    B:enableRawColorFilter=false

    # Series = one item line or metadata tier line, like storage_cell_1k/storage_cell_64k or aeadditions:storage.gas tiers. Family = a color subgroup inside one series. Example: turn this off if one series should keep one color. [default: true]
    B:enableSeriesColorFamilies=true

    # How different the whole color can look before a family splits. Example: lower splits light and dark shades sooner; higher keeps more shades together. [range: 0.0 ~ 200.0, default: 42.0]
    S:familyColorDistanceThreshold=42.0

    # How far the color direction can move before a family splits. Example: lower splits blue and teal sooner; higher keeps them together. [range: 0.0 ~ 180.0, default: 55.0]
    S:familyHueThreshold=55.0

    # How much gray, white, and pale shades may differ in brightness. Example: lower splits gray and white sooner; higher keeps neutrals together. [range: 0.0 ~ 100.0, default: 10.0]
    S:familyNeutralLightnessThreshold=10.0

    # How strongly gray and white colors get cleaned up. Example: 0.8 keeps more raw gray, 1.2 looks cleaner. [range: 0.0 ~ 3.0, default: 1.0]
    S:neutralCleanlinessBoost=1.0

    # If true, same-hue shades stay together more often. Example: keep this on so light blue and blue stay together. [default: true]
    B:preferSameHueFamilies=true

    # If true, pale colors stay soft instead of turning into strong base colors. Example: keep this on so pale pink stays pale. [default: true]
    B:preserveSoftPastels=true
}


